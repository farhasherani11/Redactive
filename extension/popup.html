<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Redactive</title>
  <style>
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 16px;
      margin: 0;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 4px;
    }
    p {
      font-size: 12px;
      color: #555;
      margin: 0 0 12px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    button {
      width: 100%;
      padding: 8px;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      min-height: 16px;
    }
    .ok { color: #15803d; }
    .err { color: #b91c1c; }
  </style>
</head>
<body>
  <h1>Redactive DLP Guard</h1>
  <p>Paste your API key below. It's stored locally in your browser and sent only to your deployed Redactive instance.</p>
  <input type="password" id="apiKey" placeholder="Your Redactive API key" />
  <button id="save">Save key</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
